<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/svg+xml" href="photo/v-favicon.svg">



</head>

<body>
    <div class="card">

        <form action="index.html">
            <h3>Create Account</h3>
            <h4>
                Create an account to get started.
            </h4>
            <label for="">Full Name</label><br>
            <input type="text" placeholder="Ahmed Hamdi">
            <br>


            <label for="">Email Address</label><br>
            <input type="email" id="mail" placeholder="ahmedhamdi@example.com" required>
            <br>



            <label for="">Password</label><br>
            <input type="password" id="pass" placeholder="8 character or More" minlength="8" required>
            <br>


            <label for="">Confirm Password</label><br>
            <input type="password" id="confirm" placeholder="Confirm Your Password" required>
            <br>
       
        
            <input type="submit" value="Create Account">




            <p>
                Already have an account?
                <a href="signin.html" class="move">Sign in here</a>
            </p>

  </form>
      
    </div>
</body>

</html>
