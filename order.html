<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order</title>
     <link rel="stylesheet" href="css/style.css">
     <link rel="stylesheet" href="css/edit.css">
     <link rel="icon" type="image/svg+xml" href="photo/v-favicon.svg">
</head>
<body>
    <div class="card">

        <form action="">
            <h3>Order Form</h3>
            <label for="">Full Name</label>
            <br>
            <input type="text" placeholder="Ahmed Hamdi">
            <br>


            <label for="">Mobile Number</label>
            <br>
            <input type="tel" placeholder="+201031833877" required minlength="11">
            <br>

            <label for="">Home Number</label>
            <br>
            <input type="tel" placeholder="0452150000">
            <br>

            <label for="">Email</label>
            <br>
            <input type="email" placeholder="ahmedhamdi@example.com" required>
            <br>


            <label for="">Delivery Address</label>
            <br>
            <input type="text" placeholder="123 Str Alex" required>
            <br>


            <label for=""> Method Of Payment</label>
            <select class="pay">
                <option value="pay">Cash</option>
                <option value="pay">Vodafone Cash</option>
                <option value="pay">Instapay</option>
                <option value="pay">Visa</option>
            </select>

            <input type="submit" value="Order Now">
        </form>
    </div>


</html>
